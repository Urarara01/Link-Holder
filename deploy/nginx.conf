# Configuración de Nginx para Link Holder
# Copiar este archivo a: /etc/nginx/sites-available/linkholder
# Crear enlace simbólico: sudo ln -s /etc/nginx/sites-available/linkholder /etc/nginx/sites-enabled/

upstream django {
    server 127.0.0.1:8000;
}

# Redirigir HTTP a HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name link.urarara.online 38.250.161.165;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# Servidor HTTPS principal
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name link.urarara.online 38.250.161.165;

    # Certificados SSL (generados con Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/link.urarara.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/link.urarara.online/privkey.pem;
    
    # Configuración SSL recomendada
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Tamaño máximo de carga
    client_max_body_size 10M;

    # Logs
    access_log /var/log/nginx/linkholder_access.log;
    error_log /var/log/nginx/linkholder_error.log;

    # Archivos estáticos del frontend (React build)
    root /var/www/linkholder/frontend/dist;
    index index.html;

    # Servir frontend (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API Backend (Django)
    location /api/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Admin de Django
    location /admin/ {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    # Archivos estáticos de Django (admin, etc.)
    location /static/ {
        alias /var/www/linkholder/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos media de Django
    location /media/ {
        alias /var/www/linkholder/backend/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Seguridad
    location ~ /\. {
        deny all;
    }
}
